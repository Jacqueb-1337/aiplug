name: Build Baritone 26.1.2 water platform edge placement fix

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Baritone 26.1 port
        uses: actions/checkout@v4
        with:
          repository: fnltochka/baritone
          ref: 26.1
          fetch-depth: 1

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "25"
          cache: gradle

      - name: Patch waterlogged top slabs, builder goals, and edge placement
        shell: python
        run: |
          from pathlib import Path
          import re

          helper_path = Path("src/main/java/baritone/pathing/movement/MovementHelper.java")
          helper = helper_path.read_text(encoding="utf-8")

          interface_marker = "public interface MovementHelper extends ActionCosts, Helper {\n"
          utility = """

              /** Treat a waterlogged top slab as an ordinary solid slab. */
              static boolean isWaterloggedTopSlab(BlockState state) {
                  return state.getBlock() instanceof SlabBlock
                          && state.getValue(SlabBlock.TYPE) == SlabType.TOP
                          && !state.getFluidState().isEmpty();
              }
          """
          if interface_marker not in helper:
              raise RuntimeError("MovementHelper marker missing")
          helper = helper.replace(interface_marker, interface_marker + utility, 1)

          water_sig = re.search(r"static boolean isWater\s*\(\s*BlockState\s+(\w+)\s*\)\s*\{", helper)
          if not water_sig:
              raise RuntimeError("isWater method missing")
          var = water_sig.group(1)
          at = water_sig.end()
          helper = helper[:at] + f"\n        if (isWaterloggedTopSlab({var})) {{\n            return false;\n        }}" + helper[at:]

          flowing_sig = re.search(r"static boolean possiblyFlowing\s*\(\s*BlockState\s+(\w+)\s*\)\s*\{", helper)
          if flowing_sig:
              var = flowing_sig.group(1)
              at = flowing_sig.end()
              helper = helper[:at] + f"\n        if (isWaterloggedTopSlab({var})) {{\n            return false;\n        }}" + helper[at:]

          old_avoid = "return !state.getFluidState().isEmpty()\n                || (block == Blocks.MAGMA_BLOCK"
          new_avoid = "return (!state.getFluidState().isEmpty() && !isWaterloggedTopSlab(state))\n                || (block == Blocks.MAGMA_BLOCK"
          if old_avoid not in helper:
              raise RuntimeError("avoidWalkingInto marker missing")
          helper = helper.replace(old_avoid, new_avoid, 1)

          water_block = """        if (isWater(state)) {
                      return MAYBE;
                  }
          """
          slab_block = """        if (block instanceof SlabBlock) {
                      if (!Baritone.settings().allowWalkOnBottomSlab.value) {
                          if (state.getValue(SlabBlock.TYPE) != SlabType.BOTTOM) {
                              return YES;
                          }
                          return NO;
                      }
                      return YES;
                  }
          """
          if helper.count(water_block) != 1 or helper.count(slab_block) != 1:
              raise RuntimeError("canWalkOn slab/water blocks missing")
          helper = helper.replace(water_block, "", 1)
          helper = helper.replace(slab_block, slab_block + water_block, 1)
          helper_path.write_text(helper, encoding="utf-8")

          packer_path = Path("src/main/java/baritone/cache/ChunkPacker.java")
          packer = packer_path.read_text(encoding="utf-8")
          old_packer = """        Block block = state.getBlock();
                  if (MovementHelper.isWater(state)) {
          """
          new_packer = """        Block block = state.getBlock();
                  if (MovementHelper.isWaterloggedTopSlab(state)) {
                      return PathingBlockType.SOLID;
                  }
                  if (MovementHelper.isWater(state)) {
          """
          if old_packer not in packer:
              raise RuntimeError("ChunkPacker marker missing")
          packer_path.write_text(packer.replace(old_packer, new_packer, 1), encoding="utf-8")

          builder_path = Path("src/main/java/baritone/process/BuilderProcess.java")
          builder = builder_path.read_text(encoding="utf-8")

          # Source-water targets are at block Y. Adjacent completed top slabs put
          # the player's feet at Y+1, so use an adjacent goal at that feet level.
          old_goal = "        sourceLiquids.forEach(pos -> toPlace.add(new GoalBlock(pos.above())));"
          new_goal = "        sourceLiquids.forEach(pos -> toPlace.add(new GoalAdjacent(pos.above(), pos, true)));"
          if old_goal not in builder:
              raise RuntimeError("source liquid goal marker missing")
          builder = builder.replace(old_goal, new_goal, 1)

          # A top slab placed into source water necessarily becomes waterlogged.
          # Ignore only that property for top slabs while keeping type=top strict.
          compare_marker = """        for (Property<?> prop : map1.keySet()) {
                      if (map1.get(prop) != map2.get(prop)
          """
          compare_replacement = """        for (Property<?> prop : map1.keySet()) {
                      boolean ignoreTopSlabWaterlogged = prop.getName().equals("waterlogged")
                              && first.getBlock() instanceof SlabBlock
                              && second.getBlock() instanceof SlabBlock
                              && first.getValue(SlabBlock.TYPE) == net.minecraft.world.level.block.state.properties.SlabType.TOP
                              && second.getValue(SlabBlock.TYPE) == net.minecraft.world.level.block.state.properties.SlabType.TOP;
                      if (map1.get(prop) != map2.get(prop)
                              && !ignoreTopSlabWaterlogged
          """
          if compare_marker not in builder:
              raise RuntimeError("sameBlockstate marker missing")
          builder = builder.replace(compare_marker, compare_replacement, 1)

          # When the player is centered on the final slab of a straight row, the
          # builder's block-coordinate goal is already satisfied, but the side
          # face is outside the placement ray. Identify that exact case so the
          # player can crouch-walk to the edge until normal placement succeeds.
          on_tick_marker = """    @Override
              public PathingCommand onTick(boolean calcFailed, boolean isSafeToCancel) {
          """
          edge_helper = """    private Optional<BetterBlockPos> topSlabEdgePlacementTarget(BuilderCalculationContext bcc) {
                  BetterBlockPos feet = ctx.playerFeet();
                  BlockState standingOn = bcc.bsi.get0(feet.below());
                  if (!(standingOn.getBlock() instanceof SlabBlock)
                          || standingOn.getValue(SlabBlock.TYPE) != net.minecraft.world.level.block.state.properties.SlabType.TOP) {
                      return Optional.empty();
                  }
                  Direction[] horizontal = {Direction.NORTH, Direction.SOUTH, Direction.EAST, Direction.WEST};
                  for (Direction direction : horizontal) {
                      BetterBlockPos target = feet.relative(direction).below();
                      if (!incorrectPositions.contains(target)) {
                          continue;
                      }
                      BlockState current = bcc.bsi.get0(target);
                      BlockState desired = bcc.getSchematic(target.x, target.y, target.z, current);
                      if (current.getBlock() == Blocks.WATER
                              && !MovementHelper.possiblyFlowing(current)
                              && desired != null
                              && desired.getBlock() instanceof SlabBlock
                              && desired.getValue(SlabBlock.TYPE) == net.minecraft.world.level.block.state.properties.SlabType.TOP) {
                          return Optional.of(target);
                      }
                  }
                  return Optional.empty();
              }

          """
          if on_tick_marker not in builder:
              raise RuntimeError("onTick insertion marker missing")
          builder = builder.replace(on_tick_marker, edge_helper + on_tick_marker, 1)

          placement_marker = """            return new PathingCommand(null, PathingCommandType.CANCEL_AND_SET_GOAL);
                  }

                  if (Baritone.settings().allowInventory.value) {
          """
          edge_behavior = """            return new PathingCommand(null, PathingCommandType.CANCEL_AND_SET_GOAL);
                  }

                  Optional<BetterBlockPos> edgeTarget = topSlabEdgePlacementTarget(bcc);
                  if (edgeTarget.isPresent() && isSafeToCancel && ctx.player().onGround()) {
                      BetterBlockPos target = edgeTarget.get();
                      Vec3 lookPoint = new Vec3(target.x + 0.5D, ctx.playerHead().y, target.z + 0.5D);
                      Rotation towardEdge = RotationUtils.calcRotationFromVec3d(ctx.playerHead(), lookPoint, ctx.playerRotations());
                      baritone.getLookBehavior().updateTarget(new Rotation(towardEdge.getYaw(), 0.0F), true);
                      baritone.getInputOverrideHandler().setInputForceState(Input.SNEAK, true);
                      baritone.getInputOverrideHandler().setInputForceState(Input.MOVE_FORWARD, true);
                      return new PathingCommand(null, PathingCommandType.CANCEL_AND_SET_GOAL);
                  }

                  if (Baritone.settings().allowInventory.value) {
          """
          if placement_marker not in builder:
              raise RuntimeError("placement fallback insertion marker missing")
          builder = builder.replace(placement_marker, edge_behavior, 1)
          builder_path.write_text(builder, encoding="utf-8")

          final = builder_path.read_text(encoding="utf-8")
          required = [
              "new GoalAdjacent(pos.above(), pos, true)",
              "ignoreTopSlabWaterlogged",
              "topSlabEdgePlacementTarget",
              "setInputForceState(Input.MOVE_FORWARD, true)",
              "setInputForceState(Input.SNEAK, true)",
          ]
          for marker in required:
              if marker not in final:
                  raise RuntimeError(f"Missing final patch marker: {marker}")
          print("Applied source-water top-slab walking, goals, and crouch-to-edge placement fallback.")

      - name: Build Fabric distribution
        run: |
          chmod +x gradlew
          ./gradlew clean :fabric:build -Pmod_version=1.17.0-water-platform-edge-placement-fix --stacktrace

      - name: Collect standalone Fabric jar
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p patched-jars
          jar=$(find dist fabric/build/libs -type f -name 'baritone-standalone-fabric-*.jar' | head -n 1)
          test -n "$jar"
          cp "$jar" patched-jars/Baritone-26.1.2-Water-Platform-Edge-Placement-Fix-Fabric.jar
          cat > patched-jars/BUILD_INFO.txt <<'EOF'
          Target: Minecraft 26.1.2
          Loader: Fabric Loader 0.19.3 or newer
          Java: 25
          Fixes waterlogged top-slab movement/cache, source-water builder goal height, and straight-row edge placement by crouch-walking to the slab edge.
          EOF
          sha256sum patched-jars/*.jar | tee patched-jars/SHA256SUMS.txt

      - name: Upload patched jar
        uses: actions/upload-artifact@v4
        with:
          name: baritone-26.1.2-water-platform-edge-placement-fix
          path: patched-jars/
          if-no-files-found: error
          retention-days: 7
