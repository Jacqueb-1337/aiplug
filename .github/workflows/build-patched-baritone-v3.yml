name: Build Baritone 26.1.2 water platform builder fix

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Baritone 26.1 port
        uses: actions/checkout@v4
        with:
          repository: fnltochka/baritone
          ref: 26.1
          fetch-depth: 1

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "25"
          cache: gradle

      - name: Patch waterlogged top slabs and liquid placement goals
        shell: python
        run: |
          from pathlib import Path
          import re

          # ------------------------------------------------------------------
          # Movement/cache: waterlogged TOP slabs are ordinary solid slabs.
          # ------------------------------------------------------------------
          helper_path = Path("src/main/java/baritone/pathing/movement/MovementHelper.java")
          helper = helper_path.read_text(encoding="utf-8")

          interface_marker = "public interface MovementHelper extends ActionCosts, Helper {\n"
          utility = """

              /**
               * A waterlogged top slab has a solid walkable upper surface.
               * Baritone should ignore its contained fluid for pathing purposes.
               */
              static boolean isWaterloggedTopSlab(BlockState state) {
                  return state.getBlock() instanceof SlabBlock
                          && state.getValue(SlabBlock.TYPE) == SlabType.TOP
                          && !state.getFluidState().isEmpty();
              }
          """
          if interface_marker not in helper:
              raise RuntimeError("MovementHelper interface marker not found")
          helper = helper.replace(interface_marker, interface_marker + utility, 1)

          water_sig = re.search(r"static boolean isWater\s*\(\s*BlockState\s+(\w+)\s*\)\s*\{", helper)
          if not water_sig:
              raise RuntimeError("isWater(BlockState) method not found")
          var = water_sig.group(1)
          inject_at = water_sig.end()
          helper = helper[:inject_at] + f"\n        if (isWaterloggedTopSlab({var})) {{\n            return false;\n        }}" + helper[inject_at:]

          flowing_sig = re.search(r"static boolean possiblyFlowing\s*\(\s*BlockState\s+(\w+)\s*\)\s*\{", helper)
          if flowing_sig:
              var = flowing_sig.group(1)
              inject_at = flowing_sig.end()
              helper = helper[:inject_at] + f"\n        if (isWaterloggedTopSlab({var})) {{\n            return false;\n        }}" + helper[inject_at:]

          old_avoid = "return !state.getFluidState().isEmpty()\n                || (block == Blocks.MAGMA_BLOCK"
          new_avoid = "return (!state.getFluidState().isEmpty() && !isWaterloggedTopSlab(state))\n                || (block == Blocks.MAGMA_BLOCK"
          if old_avoid not in helper:
              raise RuntimeError("avoidWalkingInto fluid check not found")
          helper = helper.replace(old_avoid, new_avoid, 1)

          water_block = """        if (isWater(state)) {
                      return MAYBE;
                  }
          """
          slab_block = """        if (block instanceof SlabBlock) {
                      if (!Baritone.settings().allowWalkOnBottomSlab.value) {
                          if (state.getValue(SlabBlock.TYPE) != SlabType.BOTTOM) {
                              return YES;
                          }
                          return NO;
                      }
                      return YES;
                  }
          """
          if helper.count(water_block) != 1 or helper.count(slab_block) != 1:
              raise RuntimeError("Expected canWalkOn water/slab blocks were not found exactly once")
          helper = helper.replace(water_block, "", 1)
          helper = helper.replace(slab_block, slab_block + water_block, 1)
          helper_path.write_text(helper, encoding="utf-8")

          packer_path = Path("src/main/java/baritone/cache/ChunkPacker.java")
          packer = packer_path.read_text(encoding="utf-8")
          packer_marker = """        Block block = state.getBlock();
                  if (MovementHelper.isWater(state)) {
          """
          packer_replacement = """        Block block = state.getBlock();
                  if (MovementHelper.isWaterloggedTopSlab(state)) {
                      return PathingBlockType.SOLID;
                  }
                  if (MovementHelper.isWater(state)) {
          """
          if packer_marker not in packer:
              raise RuntimeError("ChunkPacker water marker not found")
          packer = packer.replace(packer_marker, packer_replacement, 1)
          packer_path.write_text(packer, encoding="utf-8")

          # ------------------------------------------------------------------
          # Builder: pure water targets need reachable adjacent placement goals.
          # Upstream sends every source-water target to GoalBlock(pos.above()),
          # which is unreachable unless walking on water is enabled. Only expose
          # liquid targets that currently have a real neighboring support face.
          # ------------------------------------------------------------------
          builder_path = Path("src/main/java/baritone/process/BuilderProcess.java")
          builder = builder_path.read_text(encoding="utf-8")

          old_source_goal = "        sourceLiquids.forEach(pos -> toPlace.add(new GoalBlock(pos.above())));"
          new_source_goal = """        sourceLiquids.forEach(pos -> {
                      Goal liquidGoal = liquidPlacementGoal(pos, bcc);
                      if (liquidGoal != null) {
                          toPlace.add(liquidGoal);
                      }
                  });"""
          if old_source_goal not in builder:
              raise RuntimeError("Source-liquid goal line not found")
          builder = builder.replace(old_source_goal, new_source_goal, 1)

          insertion_marker = """    private Goal placementGoal(BlockPos pos, BuilderCalculationContext bcc) {
          """
          liquid_method = """    /**
               * Find a reachable standing goal for placing directly into a pure
               * liquid block. GoalPlace(pos) requires standing at pos.above(),
               * which is impossible over open water with water walking disabled.
               * Instead, use an adjacent solid shape that the item can click.
               */
              private Goal liquidPlacementGoal(BlockPos pos, BuilderCalculationContext bcc) {
                  BlockState current = ctx.world().getBlockState(pos);
                  BlockState desired = bcc.getSchematic(pos.getX(), pos.getY(), pos.getZ(), current);
                  if (desired == null || !placementPlausible(pos, desired)) {
                      return null;
                  }
                  for (Direction facing : Direction.values()) {
                      BetterBlockPos againstPos = new BetterBlockPos(pos).relative(facing);
                      BlockState againstState = ctx.world().getBlockState(againstPos);
                      if (MovementHelper.isReplaceable(againstPos.x, againstPos.y, againstPos.z, againstState, bcc.bsi)) {
                          continue;
                      }
                      VoxelShape shape = againstState.getShape(ctx.world(), againstPos);
                      if (shape.isEmpty()) {
                          continue;
                      }
                      return new GoalAdjacent(pos, againstPos, true);
                  }
                  return null;
              }

          """
          if insertion_marker not in builder:
              raise RuntimeError("placementGoal insertion marker not found")
          builder = builder.replace(insertion_marker, liquid_method + insertion_marker, 1)

          # Automatically ignore only the waterlogged property when comparing
          # top-slab desired/predicted states. Type/top orientation still matters.
          compare_marker = """        for (Property<?> prop : map1.keySet()) {
                      if (map1.get(prop) != map2.get(prop)
          """
          compare_replacement = """        for (Property<?> prop : map1.keySet()) {
                      boolean ignoreTopSlabWaterlogged = prop.getName().equals("waterlogged")
                              && first.getBlock() instanceof SlabBlock
                              && second.getBlock() instanceof SlabBlock
                              && first.getValue(SlabBlock.TYPE) == net.minecraft.world.level.block.state.properties.SlabType.TOP
                              && second.getValue(SlabBlock.TYPE) == net.minecraft.world.level.block.state.properties.SlabType.TOP;
                      if (map1.get(prop) != map2.get(prop)
                              && !ignoreTopSlabWaterlogged
          """
          if compare_marker not in builder:
              raise RuntimeError("sameBlockstate comparison marker not found")
          builder = builder.replace(compare_marker, compare_replacement, 1)
          builder_path.write_text(builder, encoding="utf-8")

          # Basic verification
          final_builder = builder_path.read_text(encoding="utf-8")
          required = [
              "liquidPlacementGoal(pos, bcc)",
              "private Goal liquidPlacementGoal",
              "ignoreTopSlabWaterlogged",
          ]
          for marker in required:
              if marker not in final_builder:
                  raise RuntimeError(f"Builder verification failed: {marker}")

          print("Patched top-slab pathing/cache and reachable builder goals for source-water targets.")

      - name: Build Fabric distribution
        run: |
          chmod +x gradlew
          ./gradlew clean :fabric:build -Pmod_version=1.17.0-water-platform-builder-fix --stacktrace

      - name: Collect standalone Fabric jar
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p patched-jars
          jar=$(find dist fabric/build/libs -type f -name 'baritone-standalone-fabric-*.jar' | head -n 1)
          test -n "$jar"
          cp "$jar" patched-jars/Baritone-26.1.2-Water-Platform-Builder-Fix-Fabric.jar
          cat > patched-jars/BUILD_INFO.txt <<'EOF'
          Target: Minecraft 26.1.2
          Loader: Fabric Loader 0.19.3 or newer
          Java: 25
          Source: fnltochka/baritone branch 26.1
          Fixes:
          - Waterlogged top slabs are solid and not water for Baritone pathing/cache.
          - Builder source-water targets use reachable adjacent support goals instead of impossible pos.above goals.
          - Builder ignores only waterlogged mismatch when comparing top slab states.
          EOF
          sha256sum patched-jars/*.jar | tee patched-jars/SHA256SUMS.txt
          ls -lah patched-jars

      - name: Upload patched jar
        uses: actions/upload-artifact@v4
        with:
          name: baritone-26.1.2-water-platform-builder-fix
          path: patched-jars/
          if-no-files-found: error
          retention-days: 7
